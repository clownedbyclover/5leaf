<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creepy Hacker Message</title>
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Hacker text */
  .drip-text {
    font-size: 2em;
    position: relative;
    opacity: 0;
    white-space: pre-wrap;
    transition: opacity 0.5s;
    z-index: 10;
    text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
  }

  .glitch {
    position: relative;
  }
  .glitch::before, .glitch::after {
    content: "a friend of his, is an enemy of mine.";
    position: absolute;
    left: 0;
  }
  .glitch::before {
    animation: glitchTop 2s infinite linear alternate-reverse;
    clip: rect(0, 900px, 50px, 0);
  }
  .glitch::after {
    animation: glitchBottom 3s infinite linear alternate-reverse;
    clip: rect(50px, 900px, 100px, 0);
  }

  @keyframes glitchTop {
    0% { transform: translate(2px, -2px); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, 2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes glitchBottom {
    0% { transform: translate(-2px, 2px); }
    20% { transform: translate(2px, -2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(-2px, 2px); }
    100% { transform: translate(0, 0); }
  }

  /* Big :) animation */
  #smile {
    font-size: 10em;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: smileIn 1s forwards, smileGlitch 1s 1s forwards, smileDisappear 0.5s 2s forwards;
    z-index: 10;
    text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
  }

  @keyframes smileIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(15deg); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  }

  @keyframes smileGlitch {
    0%,100% { transform: translate(-50%, -50%) rotate(0deg); }
    10% { transform: translate(calc(-50% + 5px), calc(-50% + 3px)) rotate(5deg); }
    20% { transform: translate(calc(-50% - 4px), calc(-50% - 4px)) rotate(-5deg); }
    30% { transform: translate(calc(-50% + 3px), calc(-50% + 5px)) rotate(3deg); }
    40% { transform: translate(calc(-50% + 2px), calc(-50% - 2px)) rotate(-2deg); }
  }

  @keyframes smileDisappear {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
  }

  /* Flashing CLOVER */
  #clover-flash {
    font-size: 5em;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ff00;
    opacity: 0;
    z-index: 20;
    text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
  }

  /* Matrix letters canvas */
  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

</style>
</head>
<body>

<div id="smile">:)</div>
<div id="message" class="drip-text glitch">a friend of his, is an enemy of mine.</div>
<div id="clover-flash">CLOVER</div>
<canvas id="matrix"></canvas>

<script>
const message = document.getElementById('message');
const smile = document.getElementById('smile');
const cloverFlash = document.getElementById('clover-flash');

// MATRIX RAIN
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}<>?/|\\";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for(let i = 0; i < columns; i++) drops[i] = Math.random() * canvas.height;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0," + (Math.random()*0.05+0.02) + ")";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";
  for(let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i*fontSize, drops[i]);
    drops[i] += fontSize;
    if(drops[i] > canvas.height && Math.random() > 0.975) drops[i] = 0;
  }
}

// Flicker hacker text
function flickerText() {
  const flickerAmount = Math.random();
  if(flickerAmount > 0.7) {
    message.style.opacity = Math.random();
  } else {
    message.style.opacity = 1;
  }
  setTimeout(flickerText, Math.random()*100);
}

// Sequence of animations
setTimeout(() => {
  // Start Matrix rain and flicker
  setInterval(drawMatrix, 35);
  flickerText();
}, 2500);

// Flash CLOVER after message shows
setTimeout(() => {
  cloverFlash.style.opacity = 1;
  setTimeout(() => {
    cloverFlash.style.opacity = 0;
  }, 300); // Flash duration
}, 5000); // Adjust timing to show after text
</script>

</body>
</html>
