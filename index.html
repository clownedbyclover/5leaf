<script>
const messageText = "a friend of his, is an enemy of mine.";
const messageEl = document.getElementById("message");
const deniedEl = document.getElementById("denied");
const finalEl = document.getElementById("final");

let i = 0;

// Typing effect
function type() {
    if (i < messageText.length) {
        messageEl.innerHTML += messageText.charAt(i);
        i++;
        setTimeout(type, 70);
    } else {
        // After typing finishes, show Access Denied after 1s
        setTimeout(showDenied, 1000);
    }
}

function showDenied() {
    deniedEl.style.opacity = "1";

    // Glitch effect starts
    document.body.classList.add("glitch");

    // After 2s, hide everything and show final CLOVER
    setTimeout(showFinal, 2000);
}

function showFinal() {
    messageEl.style.display = "none";
    deniedEl.style.display = "none";
    canvas.style.display = "none";

    document.body.style.background = "black";
    finalEl.style.opacity = "1";

    // Remove glitch after final
    document.body.classList.remove("glitch");
}

// Start typing
type();
</script>
