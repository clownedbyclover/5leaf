<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7X3F9L2Q8D1Z6M4K0</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
height:100vh;
}

/* Matrix Canvas */

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* Message */

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:2em;
color:#00ff00;
z-index:5;
white-space:nowrap;
text-shadow:
0 0 5px #00ff00,
0 0 10px #00ff00;
}

/* Access Denied */

#denied{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:red;
font-size:4em;
opacity:0;
z-index:15;
text-shadow:
0 0 10px red,
0 0 30px red;
}

/* Final Clover */

#final{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:red;
font-size:6em;
opacity:0;
z-index:20;
letter-spacing:10px;
text-shadow:
0 0 10px red,
0 0 25px red,
0 0 50px red,
0 0 100px red;
animation:redFlicker 1.5s infinite;
}

/* Flicker */

@keyframes redFlicker{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

/* Glitch */

.glitch{
animation:glitch 0.2s infinite;
}

@keyframes glitch{
0%{transform:translate(0px,0px);}
25%{transform:translate(-5px,3px);}
50%{transform:translate(5px,-3px);}
75%{transform:translate(-3px,-5px);}
100%{transform:translate(0px,0px);}
}

/* Scan Lines */

.scanlines{
position:absolute;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
transparent,
transparent 2px,
rgba(0,255,0,0.05) 2px,
rgba(0,255,0,0.05) 4px
);
z-index:2;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="scanlines"></div>

<div id="message"></div>

<div id="denied">ACCESS DENIED</div>

<div id="final">CLOVER</div>

<script>

/* Typing Effect */

const text="a friend of his, is an enemy of mine.";
const message=document.getElementById("message");

let i=0;

function type(){
if(i<text.length){
message.innerHTML+=text.charAt(i);
i++;
setTimeout(type,70);
}
}

type();


/* Matrix Rain */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize=16;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(
Math.floor(Math.random()*letters.length)
);

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}

}

setInterval(draw,33);


/* Glitch + Access Denied */

setTimeout(()=>{

document.body.classList.add("glitch");

document.getElementById("denied").style.opacity="1";

},5000);


/* Black Screen */

setTimeout(()=>{

document.getElementById("message").style.display="none";
document.getElementById("denied").style.display="none";
canvas.style.display="none";

document.body.style.background="black";

document.getElementById("final").style.opacity="1";

},7000);

</script>

</body>
</html>
